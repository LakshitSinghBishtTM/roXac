name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install liboqs system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake ninja-build libssl-dev

      - name: Build and install liboqs
        run: |
          git clone --depth 1 https://github.com/open-quantum-safe/liboqs.git
          cd liboqs
          cmake -GNinja \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DOQS_BUILD_ONLY_LIB=ON \
            .
          ninja
          sudo ninja install
          sudo ldconfig

      - name: Install roxac with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --cov=roxac --cov-report=term-missing -v